<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCal Sync | Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #6366f1;
        }

        .back-link svg {
            width: 18px;
            height: 18px;
        }

        .logo {
            margin-left: auto;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(99, 102, 241, 0.1);
            padding: 40px;
            width: 100%;
        }

        .tabs {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 32px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 14px;
            font-weight: 600;
            font-size: 15px;
            color: #94a3b8;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: rgba(99, 102, 241, 0.15);
            color: #6366f1;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
        }

        .form-container {
            position: relative;
            overflow: hidden;
        }

        .form {
            display: none;
            flex-direction: column;
            gap: 22px;
            transition: transform 0.4s ease;
        }

        .form.active {
            display: flex;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .form-input {
            background: rgba(15, 23, 42, 0.7);
            border: 1.5px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 16px;
            font-size: 15px;
            color: #f1f5f9;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .form-input::placeholder {
            color: #64748b;
        }

        .forgot-link {
            align-self: flex-end;
            font-size: 14px;
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #6366f1;
        }

        .submit-btn {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: #64748b;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(148, 163, 184, 0.2);
        }

        .divider span {
            padding: 0 16px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 16px;
            font-size: 15px;
            font-weight: 500;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(148, 163, 184, 0.3);
        }

        .google-btn svg {
            width: 20px;
            height: 20px;
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 24px;
            }
            .container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Home
            </a>
            <div class="logo">JCal Sync</div>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" data-tab="signin">Sign In</div>
                <div class="tab" data-tab="signup">Sign Up</div>
            </div>

            <div class="form-container">
                <form id="signin-form" class="form active">
                    <div class="form-group">
                        <label class="form-label" for="signin-email">Email Address</label>
                        <input type="email" id="signin-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between;">
                            <label class="form-label" for="signin-password">Password</label>
                            <a href="#" class="forgot-link">Forgot Password?</a>
                        </div>
                        <input type="password" id="signin-password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="submit-btn">Sign In</button>
                </form>

                <form id="signup-form" class="form">
                    <div class="form-group">
                        <label class="form-label" for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" class="form-input" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signup-password">Password</label>
                        <input type="password" id="signup-password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="submit-btn">Create Account</button>
                </form>
            </div>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <button class="google-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>

            <p class="footer-text">
                By continuing, you agree to JCal Sync's <a href="#" style="color: #94a3b8;">Terms of Service</a> and <a href="#" style="color: #94a3b8;">Privacy Policy</a>.
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tabs = document.querySelectorAll('.tab');
            const forms = document.querySelectorAll('.form');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetTab = tab.getAttribute('data-tab');
                    
                    tabs.forEach(t => t.classList.remove('active'));
                    forms.forEach(f => f.classList.remove('active'));
                    
                    tab.classList.add('active');
                    document.getElementById(`${targetTab}-form`).classList.add('active');
                });
            });

            document.getElementById('signin-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const email = document.getElementById('signin-email').value;
                const password = document.getElementById('signin-password').value;
                
                if (email && password) {
                    localStorage.setItem('authToken', 'mock-token-' + Math.random().toString(36).substr(2, 9));
                    window.location.href = 'app.html';
                } else {
                    alert('Please fill in all fields.');
                }
            });

            document.getElementById('signup-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const name = document.getElementById('signup-name').value;
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;
                const confirm = document.getElementById('signup-confirm').value;
                
                if (!name || !email || !password || !confirm) {
                    alert('Please fill in all fields.');
                    return;
                }
                
                if (password !== confirm) {
                    alert('Passwords do not match.');
                    return;
                }
                
                localStorage.setItem('authToken', 'mock-token-' + Math.random().toString(36).substr(2, 9));
                window.location.href = 'app.html';
            });

            document.querySelector('.google-btn').addEventListener('click', function() {
                alert('Google authentication would be implemented in a production environment.');
            });

            document.querySelector('.forgot-link').addEventListener('click', function(e) {
                e.preventDefault();
                alert('Password reset functionality would be implemented in a production environment.');
            });
        });
    </script>
</body>
</html>
